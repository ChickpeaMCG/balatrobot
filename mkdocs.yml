site_name: Balatrobot
site_description: An AI bot for Balatro — development chronicle
site_url: https://ChickpeaMCG.github.io/balatrobot/
repo_url: https://github.com/ChickpeaMCG/balatrobot
repo_name: balatrobot

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Phases:
      - Phase 1 — Replay & History: phase-1-replay-run-history.md
      - Phase 2 — Smarter FlushBot: phase-2-smarter-flushbot.md
      - Phase 3 — Mechanics Catalogue: phase-3-game-mechanics-catalogue.md
      - Phase 4 — Run Analytics: phase-4-run-analytics.md
      - Phase 5 — Documentation Site: phase-5-docs-site.md
      - Phase 6 — Booster Packs: phase-6-boosters.md
      - Phase 7a — Mechanics Polish: phase-7a-flush-bot-mechanics-polish.md
